<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Site</title>
  <link rel="icon" href="https://avatars.githubusercontent.com/u/151978475?v=4" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --accent: #00ffcc;
      --accent2: #ff3cac;
      --dim: rgba(255,255,255,0.06);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
    }

    /* ── CANVAS PARTICLES ── */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── PAGES ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .page.active { display: flex; }

    /* ── HOME ── */
    .home-inner {
      text-align: center;
      max-width: 680px;
    }

    .site-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 12vw, 8rem);
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--white) 0%, var(--accent) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3em;
      animation: fadeUp 0.9s ease both;
    }

    .site-tagline {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 3.5rem;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      align-items: center;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2.4rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
      min-width: 280px;
      justify-content: center;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .btn:hover { transform: translateY(-3px); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }

    /* Primary button */
    .btn-primary {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 28px rgba(0,255,204,0.35);
    }
    .btn-primary::before {
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    }
    .btn-primary:hover {
      box-shadow: 0 0 48px rgba(0,255,204,0.6);
    }

    /* Secondary button */
    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-secondary:hover {
      transform: none;
      box-shadow: none;
      color: rgba(255,255,255,0.5);
    }
    .btn-secondary .soon-badge {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      color: rgba(255,255,255,0.35);
    }

    /* ── GALLERY PAGE ── */
    .gallery-header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeUp 0.7s ease both;
    }

    .gallery-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 7vw, 4.5rem);
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, var(--white), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .gallery-header p {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.2rem;
      width: 100%;
      max-width: 1100px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 4/3;
      background: var(--dim);
      border: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    }

    .gallery-item:hover {
      transform: scale(1.03);
      box-shadow: 0 0 32px rgba(0,255,204,0.2);
      border-color: rgba(0,255,204,0.3);
    }

    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.3s;
    }

    .gallery-item:hover img { filter: brightness(1.1); }

    .gallery-item .img-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.6rem 0.9rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .gallery-item:hover .img-label { opacity: 1; }

    /* card wrapper: image on top, caption below */
    .gallery-card {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .gallery-caption {
      padding: 0.75rem 0.6rem 0.5rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-top: none;
    }

    .gallery-caption .cap-filename {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
      word-break: break-all;
    }

    .gallery-caption .cap-desc {
      font-size: 0.68rem;
      line-height: 1.55;
      color: rgba(255,255,255,0.38);
      font-style: italic;
    }

    /* placeholder shimmer */
    .gallery-item .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.15);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .gallery-item .placeholder svg {
      opacity: 0.15;
    }

    /* back button */
    .back-btn {
      margin-top: 2.5rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.45);
      padding: 0.7rem 1.8rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.7s 0.25s ease both;
    }
    .back-btn:hover {
      color: var(--white);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(6px);
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 60px rgba(0,255,204,0.15);
      animation: fadeUp 0.3s ease both;
    }
    .lightbox-close {
      position: absolute;
      top: 20px; right: 28px;
      font-size: 2rem;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      transition: color 0.2s;
    }
    .lightbox-close:hover { color: var(--white); }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div class="home-inner">
    <h1 class="site-title">My Site</h1>
    <p class="site-tagline">CameronCodesStuff</p>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="showPage('gallery')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77A5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        Publish on GitHub
      </button>
      <button class="btn btn-secondary" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Learn Website Creation
        <span class="soon-badge">Soon</span>
      </button>
    </div>
  </div>
</div>

<!-- GALLERY PAGE -->
<div class="page" id="page-gallery">
  <div class="gallery-header">
    <h2>Publish websites on GitHub</h2>
    <p>Publish websites | CLick on an image to enlarge</p>
  </div>

  <div class="gallery-grid" id="gallery-grid">
    <!-- Items injected by JS -->
  </div>

  <button class="back-btn" onclick="showPage('home')">← Back to Home</button>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
  /* ─── PARTICLES ─── */
  (function() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    const COLORS = ['rgba(0,255,204,', 'rgba(255,60,172,', 'rgba(255,255,255,'];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function Particle() {
      this.reset = function(born) {
        this.x    = Math.random() * W;
        this.y    = born ? Math.random() * H : -10;
        this.size = Math.random() * 1.8 + 0.4;
        this.speed= Math.random() * 1.2 + 0.3;
        this.drift= (Math.random() - 0.5) * 0.4;
        this.alpha= Math.random() * 0.55 + 0.1;
        this.color= COLORS[Math.floor(Math.random() * COLORS.length)];
        this.twinkleSpeed = Math.random() * 0.02 + 0.005;
        this.twinklePhase = Math.random() * Math.PI * 2;
      };
      this.reset(true);
    }

    function init() {
      resize();
      particles = [];
      const count = Math.floor((W * H) / 7000);
      for (let i = 0; i < count; i++) {
        const p = new Particle();
        particles.push(p);
      }
    }

    function animate(t) {
      ctx.clearRect(0, 0, W, H);
      const ts = t * 0.001;
      particles.forEach(p => {
        p.y += p.speed;
        p.x += p.drift;
        p.twinklePhase += p.twinkleSpeed;
        const alpha = p.alpha * (0.6 + 0.4 * Math.sin(p.twinklePhase));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color + alpha + ')';
        ctx.fill();
        if (p.y > H + 10) p.reset(false);
      });
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    init();
    requestAnimationFrame(animate);
  })();

  /* ─── GALLERY SETUP ─── */
  const IMAGES = [
    { src: 'Screenshot%202026-05-12%20153056.png', label: 'Screenshot 2026-05-12 153056', desc: 'Navigate to the +.' },
    { src: 'Screenshot%202026-05-12%20153134.png', label: 'Screenshot 2026-05-12 153134', desc: 'Create a new repository.' },
    { src: 'Screenshot%202026-05-12%20153208.png', label: 'Screenshot 2026-05-12 153208', desc: 'Give your repository a name. (The name is also the link).' },
    { src: 'Screenshot%202026-05-12%20153319.png', label: 'Screenshot 2026-05-12 153319', desc: 'Make sure it is public and add a README. Then create.' },
    { src: 'Screenshot%202026-05-12%20153355.png', label: 'Screenshot 2026-05-12 153355', desc: 'Add file.' },
    { src: 'Screenshot%202026-05-12%20153418.png', label: 'Screenshot 2026-05-12 153418', desc: 'Upload files (if you already have the file) or create file if you just have the code.' },
    { src: 'Screenshot%202026-05-12%20153456.png', label: 'Screenshot 2026-05-12 153456', desc: 'Add your file and then make sure it commits to main branch. Then commit changes.' },
    { src: 'Screenshot%202026-05-12%20153523.png', label: 'Screenshot 2026-05-12 153523', desc: 'Click on the file you just added.' },
    { src: 'Screenshot%202026-05-12%20153552.png', label: 'Screenshot 2026-05-12 153552', desc: 'Click the pencil to edit.' },
    { src: 'Screenshot%202026-05-12%20153622.png', label: 'Screenshot 2026-05-12 153622', desc: 'Rename the file to index.html (tells GitHub that it is your main file). Then commit changes.' },
    { src: 'Screenshot%202026-05-12%20153646.png', label: 'Screenshot 2026-05-12 153646', desc: 'Commit to main branch then commit changes.' },
    { src: 'Screenshot%202026-05-12%20153711.png', label: 'Screenshot 2026-05-12 153711', desc: 'Click settings.' },
  ];

  function buildGallery() {
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = '';
    IMAGES.forEach((img) => {
      const card = document.createElement('div');
      card.className = 'gallery-card';

      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `
        <div class="placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          Loading…
        </div>
        <img src="${img.src}" alt="${img.label}"
             onerror="this.style.display='none'"
             onload="this.previousElementSibling.style.display='none'" />
        <span class="img-label">${img.label}</span>`;
      item.addEventListener('click', () => openLightbox(img.src, img.label));

      const caption = document.createElement('div');
      caption.className = 'gallery-caption';
      caption.innerHTML = `
        <div class="cap-filename">${img.label}</div>
        <div class="cap-desc">${img.desc}</div>`;

      card.appendChild(item);
      card.appendChild(caption);
      grid.appendChild(card);
    });
  }
  buildGallery();

  /* ─── PAGE ROUTING ─── */
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    window.scrollTo(0, 0);
  }

  /* ─── LIGHTBOX ─── */
  function openLightbox(src, alt) {
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lightbox-img');
    img.src = src;
    img.alt = alt;
    lb.classList.add('open');
  }
  function closeLightbox(e) {
    if (!e || e.target !== document.getElementById('lightbox-img')) {
      document.getElementById('lightbox').classList.remove('open');
    }
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>
</body>
</html>
